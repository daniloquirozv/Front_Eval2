version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: db_eval2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: proyecto_db
    ports:
      - "3306:3306"
    volumes:
      # Montar los scripts de inicialización. MySQL los ejecuta al arrancar (solo la primera vez).
      - ./Data_Eval2/01_creacion_base_datos.sql:/docker-entrypoint-initdb.d/1_creacion.sql
      # Opcional: Persistir la base de datos
      - db_data:/var/lib/mysql
    networks:
      - eval2_network

  backend:
    build: 
      context: ./Back_EVAL2
    container_name: backend_eval2
    environment:
      - PORT=3000
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=proyecto_db
      - DB_PORT=3306
    ports:
      - "3000:3000"
    depends_on:
      - database
    networks:
      - eval2_network

  frontend:
    build: 
      context: ./Front_Eval2
    container_name: frontend_eval2
    environment:
      - PORT=5000
      - DEBUG=False
      - BACKEND_URL=http://backend:3000 # Comunicación hacia el contenedor del backend
      - SECRET_KEY=tu_clave_secreta
    ports:
      - "5000:5000"
    depends_on:
      - backend
    networks:
      - eval2_network

volumes:
  db_data:

networks:
  eval2_network:
    driver: bridge