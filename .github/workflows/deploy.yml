name: Build y Deploy Frontend (Docker + EC2)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/front:latest

      - name: Desplegar en la EC2 (via ssh)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/front:latest

            sudo docker stop front || true
            sudo docker rm front || true

            sudo docker run -d \
              --name front \
              -p 80:5000 \
              -e BACKEND_URL=${{ secrets.BACKEND_URL }} \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/front:latest